<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Контакты — Shadow Shop</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background: linear-gradient(
          177deg,
          rgba(2, 0, 36, 1) 14%,
          rgba(9, 9, 121, 1) 47%,
          rgba(0, 212, 255, 1) 100%
        );
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        color: white;
      }
      .container {
        background: rgba(255, 255, 255, 0.07);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 400px;
        text-align: center;
      }
      h2 {
        font-size: 28px;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .info-block {
        margin: 20px 0;
        text-align: left;
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 8px;
      }
      .info-block p {
        margin: 10px 0;
        font-size: 16px;
      }
      .info-block span {
        color: #00d4ff;
        font-weight: 600;
      }
      .back-btn {
        background-color: #00d4ff;
        color: #020024;
        border: none;
        padding: 12px 25px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Контакты</h2>
      <div class="info-block">
        <p>📍 <span>Адрес:</span> Ул Кырман 874</p>
        <p>📞 <span>Телефон:</span> +996 997 998 063</p>
        <p>💬 <span>Telegram:</span> @shadow_shop_admin</p>
        <p>📸 <span>Instagram:</span> @shadow.shop</p>
        <p>📦 <span>Доставка:</span> По всему Кыргызстану и СНГ</p>
      </div>
      <button class="back-btn" onclick="window.location.href = '/'">
        Назад
      </button>
    </div>
  </body>
</html>
