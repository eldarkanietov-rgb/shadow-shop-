<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация — Shadow Shop</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        /* Используем такой же темный градиент, как на главной */
        background: linear-gradient(
          177deg,
          rgba(2, 0, 36, 1) 14%,
          rgba(9, 9, 121, 1) 47%,
          rgba(0, 212, 255, 1) 100%
        );
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        color: white;
      }
      .reg-form {
        background: rgba(255, 255, 255, 0.07);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 320px;
        text-align: center;
      }
      h2 {
        margin-bottom: 25px;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 6px;
        border: none;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.9);
        font-family: "Montserrat", sans-serif;
      }
      .submit-btn {
        background-color: #00d4ff;
        color: #020024;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 15px;
        text-transform: uppercase;
        transition: background 0.2s;
      }
      .submit-btn:hover {
        background-color: #00b8dc;
      }
    </style>
  </head>
  <body>
    <div class="reg-form">
      <h2>РЕГИСТРАЦИЯ</h2>
      <form method="POST">
        <input
          type="text"
          name="username"
          placeholder="Введите логин"
          required
        />
        <input
          type="email"
          name="email"
          placeholder="Введите E-mail"
          required
        />
        <input
          type="password"
          name="password"
          placeholder="Придумайте пароль"
          required
        />
        <button type="submit" class="submit-btn">Создать аккаунт</button>
      </form>
    </div>
  </body>
</html>
